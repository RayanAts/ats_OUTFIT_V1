name: Nightly Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests supabase python-dotenv
          pip install "dbt-core==1.8.0" "dbt-postgres==1.8.0"

      - name: Run weather + calendar
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python nightly_pipeline.py --no-dbt

      - name: Run dbt
        run: |
          mkdir -p /home/runner/.dbt
          cat << 'EOF' > /home/runner/.dbt/profiles.yml
          ats_outfit:
            target: dev
            outputs:
              dev:
                type: postgres
                host: db.wvqntpaovovtpwxunkxd.supabase.co
                user: postgres
                password: "Taslescrampte?Apagnan7"
                port: 5432
                dbname: postgres
                schema: public
                threads: 4
          EOF
          print "✅ profiles.yml créé directement"
          cd ats_outfit
          dbt run

      - name: Save recommendation history
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python nightly_pipeline.py --only-history