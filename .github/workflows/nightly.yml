name: Nightly Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests supabase python-dotenv
          pip install "dbt-core==1.8.0" "dbt-postgres==1.8.0"

      - name: Run weather + calendar
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python nightly_pipeline.py --no-dbt

      - name: Run dbt
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          mkdir -p /home/runner/.dbt
          printf "ats_outfit:\n  target: dev\n  outputs:\n    dev:\n      type: postgres\n      host: aws-1-eu-central-1.pooler.supabase.com\n      user: postgres.wvqntpaovovtpwxunkxd\n      password: \"${SUPABASE_DB_PASSWORD}\"\n      port: 6543\n      dbname: postgres\n      schema: public\n      threads: 4\n" > /home/runner/.dbt/profiles.yml
          cd ats_outfit
          dbt run

      - name: Save recommendation history
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python nightly_pipeline.py --only-history